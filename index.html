<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sprite Sheet Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Sprite Sheet Generator</h1>
            <p>Generate perfectly gridded animation frames with a single AI prompt</p>
        </header>

        <div class="controls">
            <div class="input-group">
                <label for="prompt">Animation Description</label>
                <textarea id="prompt" placeholder="e.g., A walking character cycle, 8 frames in a 4x2 grid, pixel art style, each frame shows different walking poses"></textarea>
            </div>

            <div class="grid-controls">
                <div class="input-group">
                    <label for="columns">Grid Columns</label>
                    <div class="grid-input-group">
                        <select id="columns">
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4" selected>4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="8">8</option>
                        </select>
                        <input type="number" id="columnsManual" min="1" max="20" value="4" placeholder="Custom">
                    </div>
                </div>
                <div class="input-group">
                    <label for="rows">Grid Rows</label>
                    <div class="grid-input-group">
                        <select id="rows">
                            <option value="1">1</option>
                            <option value="2" selected>2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                        </select>
                        <input type="number" id="rowsManual" min="1" max="20" value="2" placeholder="Custom">
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label for="style">Style Instructions</label>
                <select id="style">
                    <option value="">Custom (use description above)</option>
                    <option value="pixel art style, 16-bit retro game graphics">Pixel Art</option>
                    <option value="cartoon animation style, clean lines">Cartoon</option>
                    <option value="realistic 3D rendered style">3D Realistic</option>
                    <option value="hand-drawn animation style">Hand-drawn</option>
                    <option value="minimalist flat design">Minimalist</option>
                </select>
            </div>

            <button id="generateBtn" class="generate-btn">
                <span class="btn-text">Generate Sprite Sheet</span>
                <div class="loading-spinner" style="display: none;"></div>
            </button>
        </div>

        <div id="results" class="results" style="display: none;">
            <div class="result-section">
                <h3>Generated Sprite Sheet</h3>
                <div class="sprite-container">
                    <img id="spriteSheet" alt="Generated sprite sheet">
                    <div class="grid-overlay" id="gridOverlay"></div>
                </div>
            </div>

            <div class="result-section">
                <h3>Individual Frames</h3>
                <div id="frameContainer" class="frame-container"></div>
            </div>

            <div class="result-section">
                <h3>Animation Preview</h3>
                <div class="animation-controls">
                    <button id="playBtn">Play</button>
                    <button id="pauseBtn">Pause</button>
                    <div class="speed-control">
                        <label for="speedSlider">Speed:</label>
                        <input type="range" id="speedSlider" min="50" max="1000" value="200">
                        <span id="speedValue">200ms</span>
                    </div>
                </div>
                <div class="animation-preview">
                    <canvas id="animationCanvas"></canvas>
                </div>
            </div>

            <div class="result-section">
                <h3>Export Options</h3>
                <div class="export-controls">
                    <button id="downloadFrames">Download All Frames</button>
                    <button id="downloadGif">Download as GIF</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
