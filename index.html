<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Sprite Sheet Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>AI Sprite Sheet Tool</h1>
      <p>Create, align, and export uniform frames from a single prompt.</p>
    </header>

    <section class="panel">
      <div class="field">
        <label for="prompt">Animation Description</label>
        <textarea id="prompt" placeholder="A sprite sheet showing four frames of animation of a bird in flight. The bird is depicted in silhouette, with the wings in various positions suggesting movement. The style is simple and graphic, suitable for animation or game use. The background is transparent."></textarea>
      </div>

      <div class="grid-row">
        <div class="field">
          <label for="cols">Columns</label>
          <input id="cols" type="number" min="1" max="20" value="2"/>
        </div>
        <div class="field">
          <label for="rows">Rows</label>
          <input id="rows" type="number" min="1" max="20" value="2"/>
        </div>
        <div class="field">
          <label for="style">Style</label>
          <select id="style">
            <option value="">Custom</option>
            <option value="pixel art style, 16-bit retro game graphics">Pixel Art</option>
            <option value="cartoon animation style, clean lines">Cartoon</option>
            <option value="realistic 3D rendered style">3D Realistic</option>
            <option value="hand-drawn animation style">Hand-drawn</option>
            <option value="minimalist flat design">Minimalist</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="generate">
          <span class="btn-text">Generate Sprite Sheet</span>
          <span class="loader" aria-hidden="true"></span>
        </button>
        <label class="file-btn">
          <input id="upload" type="file" accept="image/*" hidden/>
          <span>Upload Sprite Sheet</span>
        </label>
      </div>
    </section>

    <section class="panel" id="workArea" style="display:none;">
      <h3>Sprite Sheet & Grid</h3>
      <div class="sheet-wrap" id="sheetWrap">
        <img id="sheet" alt="sprite sheet"/>
        <div id="overlay"></div>
      </div>
      <p class="hint">Tip: Drag grid lines to align frames precisely.</p>
    </section>

    <section class="panel" id="framesArea" style="display:none;">
      <h3>Frames (Uniform Size)</h3>
      <div id="frames" class="frames"></div>
    </section>

    <section class="panel" id="previewArea" style="display:none;">
      <h3>Animation Preview</h3>
      <div class="controls">
        <button id="play">Play</button>
        <button id="pause">Pause</button>
        <label class="speed">
          <span>Speed</span>
          <input id="speed" type="range" min="50" max="1000" value="200"/>
          <span id="speedVal">200ms</span>
        </label>
      </div>
      <canvas id="preview" class="preview"></canvas>
    </section>

    <section class="panel" id="exportArea" style="display:none;">
      <h3>Export</h3>
      <div class="actions">
        <button id="dlFrames">Download All Frames (PNG)</button>
        <button id="dlSheet">Download Sprite Sheet (PNG)</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>

</body>
</html>
